<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>News App</title>
        <link rel="stylesheet" href="./index.css">
    </head>
    <body>
        <div id="app">
            <header>
                <span class="menu-btn" id="menu-btn">☰</span>
                <span>News App</span>
                <nav id="nav-bar" class="nav-bar"></nav>
                <button id="toggle-mode" class="toggle-btn">🌞</button>
            </header>
            <nav id="nav-drawer" class="nav-drawer">
                <div class="drawer-header">
                    <h3>Categories</h3>
                    <button id="close-drawer-btn" class="close-drawer-btn">❌</button>
                </div>
                <div id="drawer-bar"></div>
            </nav>
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Search news..."/>
            </div>

            <main id="news-container" class="news-container"></main>
            <div id="error" class="error hidden">Failed to load news. Please try again</div>
        </div>
        <script src="./index.js"></script>
    </body>
</html>
